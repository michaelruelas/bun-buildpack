name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pack
        uses: buildpacks/github-actions/setup-pack@v5

      - name: Validate builder.toml
        run: pack builder validate builder.toml
